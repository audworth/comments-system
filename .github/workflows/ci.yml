name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: download dependencies
        run: go mod download

      - name: verify dependencies
        run: go mod verify

      - name: check generated files and modules
        run: |
          go generate ./...
          go mod tidy
          git diff --exit-code

      - name: check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "unformatted files:"
            echo "$files"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./...
